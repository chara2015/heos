# config.yml - Heos Folia 配置
# 源代码链接: https://github.com/chara2015/heos
# 开源协议: MIT
# 修改后重启服务器生效。
# 数据文件保存在当前插件目录的 data 文件夹中。

auth:
    # 是否启用登录/注册认证。关闭后玩家无需使用 /login 或 /register。
    enabled: true
    # 语言文件代码，例如 zh_cn 或 en_us。多数提示文本会从对应语言文件读取。
    language: zh_cn

offline:
    # 在线模式服务器中是否允许非正版玩家进入。关闭后只允许通过正版验证的玩家进入。
    allow-players: true
    # 是否允许离线玩家名称在正版名称规则外额外使用 +、-、.。
    # 关闭后仅允许 A-Z、a-z、0-9、_，长度仍为 3-16。
    allow-more-username-characters: true
    # 是否允许离线玩家名称使用中文、其他语言字母和数字等 Unicode 字符。
    # 此设置可独立开启，不依赖 +、-、. 扩展字符设置。
    allow-unicode-username-characters: true
    # 是否分离同名正版账号和离线账号的 Heos 登录数据，避免账号类型切换时覆盖注册信息。
    separate-online-offline-accounts: true

login:
    # 玩家进入服务器后必须完成登录/注册的时间限制，单位为秒。
    timeout-seconds: 60
    # 未登录玩家收到登录/注册提醒的间隔，单位为秒。
    reminder-seconds: 10
    # 注册密码允许的最短长度。
    min-password-length: 4
    # 注册密码允许的最长长度。
    max-password-length: 32

security:
    # 同一个 IP 最多允许同时在线的玩家数量。-1 表示不限制。
    max-sessions-per-ip: -1
    # 同 IP 在线数量超过 max-sessions-per-ip 时踢出玩家显示的消息。
    # 这是管理员可自定义文案，不会自动跟随语言文件。
    session-limit-kick-message: The online session limit for this IP has been reached
    # 是否在同一用户名连续登录失败过多时临时锁定该用户名。
    username-failure-lock: true
    # 触发用户名临时锁定前允许的连续失败次数。
    username-failure-limit: 5
    # 用户名触发失败锁定后的持续时间，单位为秒。
    username-failure-lock-seconds: 30
    # 是否在同一 IP 连续登录失败过多时临时锁定该 IP。
    ip-failure-lock: false
    # 触发 IP 临时锁定前允许的连续失败次数。
    ip-failure-limit: 10
    # IP 触发失败锁定后的持续时间，单位为秒。
    ip-failure-lock-seconds: 30

features:
    # 是否启用 Heos 自带白名单检查。
    whitelist: false
    # 是否启用 Heos 自带封禁系统和封禁命令。
    custom-ban: true
    # 是否启用离线/正版玩家数据迁移功能。只在需要迁移玩家数据时开启。
    player-data-migration: false
    # 数据迁移期间临时阻止相关玩家登录的时间，单位为秒。
    migration-ban-seconds: 30

integrations:
    # 是否在玩家列表页脚显示服务器 TPS 信息。
    tps-footer: true
    # TPS 信息刷新间隔，单位为 tick。20 tick 约等于 1 秒。
    tps-footer-delay-ticks: 20
    # 是否启用日志过滤，隐藏登录、注册、改密等敏感命令内容。
    log-filter: true
    # 是否启用 JEI/REI 配方查看器同步。仅在支持的 Minecraft 版本上生效。
    recipe-viewer-sync: true
